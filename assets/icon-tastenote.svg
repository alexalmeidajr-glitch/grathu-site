<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <linearGradient id="grad-tn" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00e5bc" />
      <stop offset="100%" stop-color="#00d2ff" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.3" />
    </filter>
  </defs>
  <rect x="5" y="5" width="90" height="90" rx="22" fill="#0b0c10" stroke="#1f2937" stroke-width="2" />
  
  <g transform="translate(15, 15) scale(0.7)" filter="url(#shadow)">
    <!-- Wine Glass Outline -->
    <path d="M 28,15 L 52,15 C 52,15 55,38 40,38 C 25,38 28,15 28,15 Z M 40,38 L 40,65 M 30,65 L 50,65" 
          fill="none" stroke="url(#grad-tn)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" />
          
    <!-- Coffee Cup Outline -->
    <path d="M 45,35 L 75,35 C 75,35 78,55 60,55 C 45,55 45,35 45,35 Z M 75,40 C 80,40 82,44 82,47 C 82,50 80,51 75,51" 
          fill="none" stroke="#ffffff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" />
          
    <!-- Rating Star on top -->
    <polygon points="62,5 65,15 75,15 67,21 70,30 62,24 54,30 57,21 49,15 59,15" fill="#00e5bc" />
  </g>
</svg>
