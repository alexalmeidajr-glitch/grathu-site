<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <linearGradient id="grad-ff" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="100%" stop-color="#4facfe" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.3" />
    </filter>
  </defs>
  <!-- Rounded App Icon Background -->
  <rect x="5" y="5" width="90" height="90" rx="22" fill="#111827" stroke="#1f2937" stroke-width="2" />
  
  <!-- Icon Design -->
  <g transform="translate(10, 10) scale(0.8)">
    <!-- Outer concentric tracking circle -->
    <circle cx="50" cy="50" r="40" fill="none" stroke="#1f2937" stroke-width="4" />
    <!-- Gradient progress ring -->
    <path d="M 50,10 A 40,40 0 1,1 17,74" fill="none" stroke="url(#grad-ff)" stroke-width="8" stroke-linecap="round" filter="url(#shadow)" />
    
    <!-- Stylized checkmark/arrow pointing forward (productivity) -->
    <path d="M 38,50 L 47,59 L 68,36" fill="none" stroke="#ffffff" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" />
  </g>
</svg>
