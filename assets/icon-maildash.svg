<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <linearGradient id="grad-md" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d2ff" />
      <stop offset="100%" stop-color="#00b0ff" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.3" />
    </filter>
  </defs>
  <rect x="5" y="5" width="90" height="90" rx="22" fill="#0b0c10" stroke="#1f2937" stroke-width="2" />
  
  <g transform="translate(15, 15) scale(0.7)" filter="url(#shadow)">
    <!-- Email Envelope (Background) -->
    <rect x="10" y="20" width="80" height="55" rx="10" fill="url(#grad-md)" />
    <!-- Envelope Fold -->
    <path d="M 10,25 L 50,52 L 90,25" fill="none" stroke="#0b0c10" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" opacity="0.4" />
    
    <!-- Diagnostic bars overlaying -->
    <g transform="translate(18, 30)">
      <rect x="0" y="22" width="10" height="15" rx="2" fill="#ffffff" />
      <rect x="16" y="10" width="10" height="27" rx="2" fill="#ffffff" />
      <rect x="32" y="17" width="10" height="20" rx="2" fill="#ffffff" />
      <rect x="48" y="0" width="10" height="37" rx="2" fill="#000000" opacity="0.6" />
    </g>
  </g>
</svg>
