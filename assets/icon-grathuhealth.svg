    <path d="M 50,5 C 50,5 85,15 85,45 C 85,75 50,95 50,95 C 50,95 15,75 15,45 C 15,15 50,5 50,5 Z" fill="url(#grad-gh)" />
    
    <!-- Heart shape cutout for health -->
    <path d="M 50,30 C 50,30 42,20 32,20 C 22,20 18,30 22,42 C 28,54 50,72 50,72 C 50,72 72,54 78,42 C 82,30 78,20 68,20 C 58,20 50,30 50,30 Z" fill="#0b0c10" />
    
    <!-- Pulse Line in center -->
    <path d="M 32,45 L 42,45 L 46,35 L 50,55 L 55,40 L 59,45 L 68,45" fill="none" stroke="#00e676" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
