<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <!-- Productivity Gradient (Cyan to Blue) -->
    <linearGradient id="grad-prod" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="100%" stop-color="#4facfe" />
    </linearGradient>
    
    <!-- Well-being Gradient (Emerald to Teal) -->
    <linearGradient id="grad-well" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#43e97b" />
      <stop offset="100%" stop-color="#38f9d7" />
    </linearGradient>
    
    <!-- Fun/Games Gradient (Purple to Pink) -->
    <linearGradient id="grad-fun" x1="100%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#f857a6" />
      <stop offset="100%" stop-color="#ff5858" />
    </linearGradient>
    
    <!-- Overall Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background container for reference, transparent for versatility -->
  <g transform="translate(5, 5) scale(0.9)">
    <!-- Path 1: Well-being (Left loop/wing) -->
    <path d="M 30,50 C 15,35 15,15 35,15 C 55,15 50,35 50,50 C 50,65 55,85 35,85 C 15,85 15,65 30,50 Z" 
          fill="none" 
          stroke="url(#grad-well)" 
          stroke-width="8" 
          stroke-linecap="round"
          opacity="0.85" />

    <!-- Path 2: Productivity (Right loop/wing) -->
    <path d="M 70,50 C 85,35 85,15 65,15 C 45,15 50,35 50,50 C 50,65 45,85 65,85 C 85,85 85,65 70,50 Z" 
          fill="none" 
          stroke="url(#grad-prod)" 
          stroke-width="8" 
          stroke-linecap="round"
          opacity="0.85" />
          
    <!-- Path 3: Core intersection (Stylized G central arc / Fun) -->
    <path d="M 50,28 A 22,22 0 1,1 28,50 L 50,50" 
          fill="none" 
          stroke="url(#grad-fun)" 
          stroke-width="9" 
          stroke-linecap="round"
          stroke-linejoin="round"
          filter="url(#glow)" />
          
    <!-- Central spark/dot representing the user / energy -->
    <circle cx="50" cy="50" r="5" fill="#ffffff" />
  </g>
</svg>
